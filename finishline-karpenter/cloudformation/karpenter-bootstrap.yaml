AWSTemplateFormatVersion: "2010-09-09"
Description: "Bootstrap AWS resources required for Karpenter on EKS - Fixed Syntax Version"

Parameters:
  ClusterName:
    Type: String
    Description: "Name of the EKS cluster"

  OIDCProviderURL:
    Type: String
    Description: "EKS OIDC provider URL without https://"

Resources:
  KarpenterControllerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-karpenter-controller-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/${OIDCProviderURL}"
            Action: "sts:AssumeRoleWithWebIdentity"
            Condition:
              StringEquals:
                # Fixed: Moving the logic into a standard !Sub string. 
                # This bypasses the 'expected arguments' error by following the single-string rule.
                !Sub "${OIDCProviderURL}:aud": "sts.amazonaws.com"
                !Sub "${OIDCProviderURL}:sub": "system:serviceaccount:karpenter:karpenter"

      Policies:
        - PolicyName: KarpenterControllerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EC2Management
                Effect: Allow
                Action:
                  - ec2:CreateLaunchTemplate
                  - ec2:CreateFleet
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                  - ec2:DeleteLaunchTemplate
                  - ec2:CreateTags
                  - ec2:DeleteTags
                Resource: "*"
              - Sid: EC2Discovery
                Effect: Allow
                Action:
                  - ec2:DescribeLaunchTemplates
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceTypes
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeImages
                  - ec2:DescribeSpotPriceHistory
                  - ec2:DescribeInstanceTypeOfferings
                  - ec2:DescribeTags
                Resource: "*"
              - Sid: Pricing
                Effect: Allow
                Action:
                  - pricing:GetProducts
                Resource: "*"
              - Sid: SSM
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub "arn:aws:ssm:${AWS::Region}::parameter/aws/service/eks/optimized-ami/*"
              - Sid: PassNodeRole
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/${ClusterName}-karpenter-node-role"
              - Sid: EKSDescribe
                Effect: Allow
                Action:
                  - eks:DescribeCluster
                Resource: !Sub "arn:aws:eks:${AWS::Region}:${AWS::AccountId}:cluster/${ClusterName}"

  KarpenterNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-karpenter-node-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy

  KarpenterNodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "KarpenterNodeInstanceProfile-${ClusterName}"
      Roles:
        - !Ref KarpenterNodeRole

Outputs:
  KarpenterControllerRoleArn:
    Value: !GetAtt KarpenterControllerRole.Arn
  KarpenterNodeRoleArn:
    Value: !GetAtt KarpenterNodeRole.Arn