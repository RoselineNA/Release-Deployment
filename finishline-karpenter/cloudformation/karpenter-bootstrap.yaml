AWSTemplateFormatVersion: "2010-09-09"
Description: "Bootstrap AWS resources required for Karpenter on EKS"

Parameters:
  ClusterName:
    Type: String
    Description: Name of the EKS cluster

Resources:

  ########################################################
  # Get Cluster OIDC Provider URL
  ########################################################
  KarpenterOIDCProvider:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${ClusterName}/karpenter/oidc-provider-placeholder"
      Type: String
      Value: "Replace after stack creation if needed"

  ########################################################
  # Karpenter Controller IAM Role
  ########################################################
  KarpenterControllerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-karpenter-controller-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/${OIDCProviderURL}"
            Action: "sts:AssumeRoleWithWebIdentity"
            Condition:
              StringEquals:
                !Sub "${OIDCProviderURL}:aud": "sts.amazonaws.com"
                !Sub "${OIDCProviderURL}:sub": "system:serviceaccount:kube-system:karpenter"
      Policies:
        - PolicyName: KarpenterControllerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EC2
                Effect: Allow
                Action:
                  - ec2:CreateLaunchTemplate
                  - ec2:CreateFleet
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                  - ec2:DescribeLaunchTemplates
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceTypes
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeImages
                  - ec2:DescribeSpotPriceHistory
                  - ec2:DescribeInstanceTypeOfferings
                  - ec2:DeleteLaunchTemplate
                  - ec2:CreateTags
                Resource: "*"

              - Sid: Pricing
                Effect: Allow
                Action:
                  - pricing:GetProducts
                Resource: "*"

              - Sid: SSM
                Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: "*"

              - Sid: PassNodeRole
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/${ClusterName}-karpenter-node-role"

              - Sid: EKSDescribe
                Effect: Allow
                Action:
                  - eks:DescribeCluster
                Resource: "*"

  ########################################################
  # Karpenter Node IAM Role
  ########################################################
  KarpenterNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-karpenter-node-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: "sts:AssumeRole"

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy

  ########################################################
  # Instance Profile for Nodes
  ########################################################
  KarpenterNodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${ClusterName}-karpenter-node-instance-profile"
      Roles:
        - !Ref KarpenterNodeRole

Outputs:
  KarpenterControllerRoleArn:
    Value: !GetAtt KarpenterControllerRole.Arn
    Export:
      Name: !Sub "${ClusterName}-KarpenterControllerRoleArn"

  KarpenterNodeRoleArn:
    Value: !GetAtt KarpenterNodeRole.Arn
    Export:
      Name: !Sub "${ClusterName}-KarpenterNodeRoleArn"

  KarpenterNodeInstanceProfileName:
    Value: !Ref KarpenterNodeInstanceProfile
    Export:
      Name: !Sub "${ClusterName}-KarpenterNodeInstanceProfileName"
      