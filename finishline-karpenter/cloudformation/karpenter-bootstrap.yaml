AWSTemplateFormatVersion: "2010-09-09"
Description: "Karpenter Bootstrap IAM Roles (Production Ready)"

Parameters:
  ClusterName:
    Type: String

  OIDCProviderURL:
    Type: String
    Description: "OIDC provider WITHOUT https:// (example: oidc.eks.us-east-1.amazonaws.com/id/XXXX)"

Resources:

  # ------------------------------------------------------------
  # Karpenter Controller Role (IRSA)
  # ------------------------------------------------------------
  KarpenterControllerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-karpenter-controller-role"
      AssumeRolePolicyDocument:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {
                    "Federated": "arn:aws:iam::${AWS::AccountId}:oidc-provider/${OIDC}"
                  },
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${OIDC}:sub": "system:serviceaccount:karpenter:karpenter",
                      "${OIDC}:aud": "sts.amazonaws.com"
                    }
                  }
                }
              ]
            }
          - OIDC: !Ref OIDCProviderURL

      Policies:
        - PolicyName: KarpenterControllerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              # EC2 provisioning permissions
              - Sid: EC2Management
                Effect: Allow
                Action:
                  - ec2:CreateLaunchTemplate
                  - ec2:CreateFleet
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                  - ec2:DeleteLaunchTemplate
                  - ec2:CreateTags
                  - ec2:DeleteTags
                  - ec2:Describe*
                Resource: "*"

              # Pricing API
              - Sid: Pricing
                Effect: Allow
                Action:
                  - pricing:GetProducts
                Resource: "*"

              # Required for node IAM role attachment
              - Sid: IAMPassRole
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt KarpenterNodeRole.Arn

              # EKS read access
              - Sid: EKSDescribe
                Effect: Allow
                Action:
                  - eks:DescribeCluster
                Resource: "*"

  # ------------------------------------------------------------
  # Node Role (for EC2 instances created by Karpenter)
  # ------------------------------------------------------------
  KarpenterNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-karpenter-node-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy

  # ------------------------------------------------------------
  # Instance Profile for Nodes
  # ------------------------------------------------------------
  KarpenterNodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${ClusterName}-karpenter-node-instance-profile"
      Roles:
        - !Ref KarpenterNodeRole

# ------------------------------------------------------------
# OUTPUTS
# ------------------------------------------------------------
Outputs:

  KarpenterControllerRole:
    Description: "IAM Role used by Karpenter controller (IRSA)"
    Value: !GetAtt KarpenterControllerRole.Arn
    Export:
      Name: !Sub "${ClusterName}-KarpenterControllerRole"

  KarpenterNodeRole:
    Description: "IAM Role used by EC2 nodes created by Karpenter"
    Value: !GetAtt KarpenterNodeRole.Arn
    Export:
      Name: !Sub "${ClusterName}-KarpenterNodeRole"

  KarpenterNodeInstanceProfile:
    Description: "Instance Profile for Karpenter nodes"
    Value: !Ref KarpenterNodeInstanceProfile
    Export:
      Name: !Sub "${ClusterName}-KarpenterNodeInstanceProfile"