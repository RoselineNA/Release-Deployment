AWSTemplateFormatVersion: "2010-09-09"
Description: "Bootstrap AWS resources for Karpenter - Holistic Final Version"

Parameters:
  ClusterName:
    Type: String
  OIDCProviderURL:
    Type: String

Resources:
  KarpenterControllerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        # The "|" (Literal Block Scalar) treats the policy as a raw string.
        # This satisfies the YAML parser (no unhashable dicts) and the
        # EarlyValidation hook (resolvable mapping).
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {
                    "Federated": "arn:aws:iam::${AWS::AccountId}:oidc-provider/${URL}"
                  },
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${URL}:aud": "sts.amazonaws.com",
                      "${URL}:sub": "system:serviceaccount:karpenter:karpenter"
                    }
                  }
                }
              ]
            }
          - URL: !Ref OIDCProviderURL

      Policies:
        - PolicyName: KarpenterControllerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EC2Management
                Effect: Allow
                Action:
                  - ec2:CreateLaunchTemplate
                  - ec2:CreateFleet
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                  - ec2:DeleteLaunchTemplate
                  - ec2:CreateTags
                  - ec2:DeleteTags
                Resource: "*"
              - Sid: Pricing
                Effect: Allow
                Action:
                  - pricing:GetProducts
                Resource: "*"
              - Sid: PassNodeRole
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt KarpenterNodeRole.Arn

  KarpenterNodeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy

  KarpenterNodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: KarpenterNodeInstanceProfile
      Roles:
        - !Ref KarpenterNodeRole
  Outputs:
    KarpenterControllerRole:
      Description: Karpenter Controller IAM Role
      Value: !Ref KarpenterControllerRole
      Export:
      Name: !Sub "${ClusterName}-KarpenterControllerRole"

    KarpenterNodeRole:
      Description: Karpenter Node IAM Role
      Value: !Ref KarpenterNodeRole
      Export:
      Name: !Sub "${ClusterName}-KarpenterNodeRole"
