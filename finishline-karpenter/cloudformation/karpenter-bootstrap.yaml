AWSTemplateFormatVersion: "2010-09-09"
Description: "Bootstrap AWS resources required for Karpenter on EKS"

Parameters:
  ClusterName:
    Type: String
    Description: Name of the EKS cluster

  OIDCProviderURL:
    Type: String
    Description: EKS OIDC provider URL without https://
    Default: oidc.eks.us-east-1.amazonaws.com/id/REPLACE_ME

Resources:
  ########################################################
  # SQS Queue for interruption handling
  ########################################################
  KarpenterInterruptionQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ClusterName}-karpenter-interruption-queue"

  KarpenterInterruptionQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref KarpenterInterruptionQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowEventBridgeToSendMessages
            Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt KarpenterInterruptionQueue.Arn

  ########################################################
  # EventBridge rules for interruption / rebalance events
  ########################################################
  SpotInterruptionRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${ClusterName}-spot-interruption"
      EventPattern:
        source:
          - aws.ec2
        detail-type:
          - EC2 Spot Instance Interruption Warning
      Targets:
        - Arn: !GetAtt KarpenterInterruptionQueue.Arn
          Id: KarpenterInterruptionQueueTarget

  RebalanceRecommendationRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${ClusterName}-rebalance-recommendation"
      EventPattern:
        source:
          - aws.ec2
        detail-type:
          - EC2 Instance Rebalance Recommendation
      Targets:
        - Arn: !GetAtt KarpenterInterruptionQueue.Arn
          Id: KarpenterInterruptionQueueTarget

  InstanceStateChangeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${ClusterName}-instance-state-change"
      EventPattern:
        source:
          - aws.ec2
        detail-type:
          - EC2 Instance State-change Notification
      Targets:
        - Arn: !GetAtt KarpenterInterruptionQueue.Arn
          Id: KarpenterInterruptionQueueTarget

  ScheduledChangeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${ClusterName}-scheduled-change"
      EventPattern:
        source:
          - aws.health
        detail-type:
          - AWS Health Event
      Targets:
        - Arn: !GetAtt KarpenterInterruptionQueue.Arn
          Id: KarpenterInterruptionQueueTarget

  ########################################################
  # IAM Role for EC2 instances launched by Karpenter
  ########################################################
  KarpenterNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "KarpenterNodeRole-${ClusterName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: EC2AssumeRole
            Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  ########################################################
  # Instance Profile used by EC2NodeClass
  ########################################################
  KarpenterNodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "KarpenterNodeInstanceProfile-${ClusterName}"
      Roles:
        - !Ref KarpenterNodeRole

  ########################################################
  # Karpenter Controller IRSA Role
  ########################################################
  KarpenterControllerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${ClusterName}-karpenter-controller-policy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: KarpenterEC2Access
            Effect: Allow
            Action:
              - ec2:CreateLaunchTemplate
              - ec2:CreateFleet
              - ec2:RunInstances
              - ec2:CreateTags
              - ec2:TerminateInstances
              - ec2:DeleteLaunchTemplate
              - ec2:DescribeLaunchTemplates
              - ec2:DescribeInstances
              - ec2:DescribeSubnets
              - ec2:DescribeSecurityGroups
              - ec2:DescribeImages
              - ec2:DescribeSpotPriceHistory
              - ec2:DescribeInstanceTypes
              - ec2:DescribeInstanceTypeOfferings
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeTags
            Resource: "*"

          - Sid: PricingAccess
            Effect: Allow
            Action:
              - pricing:GetProducts
            Resource: "*"

          - Sid: SSMAccess
            Effect: Allow
            Action:
              - ssm:GetParameter
            Resource: "*"

          - Sid: PassNodeRole
            Effect: Allow
            Action:
              - iam:PassRole
            Resource: !GetAtt KarpenterNodeRole.Arn

          - Sid: EKSDescribeCluster
            Effect: Allow
            Action:
              - eks:DescribeCluster
            Resource: "*"

          - Sid: InterruptionQueueAccess
            Effect: Allow
            Action:
              - sqs:DeleteMessage
              - sqs:GetQueueUrl
              - sqs:GetQueueAttributes
              - sqs:ReceiveMessage
            Resource: !GetAtt KarpenterInterruptionQueue.Arn

  KarpenterControllerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-karpenter"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowIRSA
            Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/${OIDCProviderURL}"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                !Sub "${OIDCProviderURL}:sub": "system:serviceaccount:kube-system:karpenter"
                !Sub "${OIDCProviderURL}:aud": "sts.amazonaws.com"
      ManagedPolicyArns:
        - !Ref KarpenterControllerPolicy

Outputs:
  InterruptionQueueName:
    Description: Name of the SQS queue used by Karpenter
    Value: !Ref KarpenterInterruptionQueue

  InterruptionQueueArn:
    Description: ARN of the SQS queue used by Karpenter
    Value: !GetAtt KarpenterInterruptionQueue.Arn

  NodeRoleName:
    Description: IAM role name for Karpenter-launched nodes
    Value: !Ref KarpenterNodeRole

  NodeRoleArn:
    Description: IAM role ARN for Karpenter-launched nodes
    Value: !GetAtt KarpenterNodeRole.Arn

  InstanceProfileName:
    Description: Instance profile used by Karpenter-launched nodes
    Value: !Ref KarpenterNodeInstanceProfile

  ControllerRoleArn:
    Description: IAM role ARN used by Karpenter controller service account
    Value: !GetAtt KarpenterControllerRole.Arn