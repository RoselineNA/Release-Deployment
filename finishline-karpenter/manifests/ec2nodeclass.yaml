apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: Bottlerocket

  # REQUIRED for Bottlerocket + K8s 1.33
  amiSelectorSSM:
    parameter: "/aws/service/bottlerocket/aws-k8s-1.33/x86_64/latest/image_id"

  instanceProfile: finishline-eks-cluster-karpenter-node-instance-profile

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: finishline-eks-cluster

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: finishline-eks-cluster

  tags:
    Name: finishline-karpenter-node
    ManagedBy: Karpenter
    karpenter.sh/discovery: finishline-eks-cluster

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 20Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true

  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required
